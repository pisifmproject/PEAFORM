# Apache Virtual Host Configuration for PEAFORM
# File ini harus ditambahkan ke Apache configuration
# Lokasi: C:\xampp\apache\conf\extra\httpd-vhosts.conf
# Atau: /etc/apache2/sites-available/peaform.conf (Linux)

# IMPORTANT: Pastikan modules ini enabled di httpd.conf:
# LoadModule rewrite_module modules/mod_rewrite.so
# LoadModule proxy_module modules/mod_proxy.so
# LoadModule proxy_http_module modules/mod_proxy_http.so
# LoadModule headers_module modules/mod_headers.so

<VirtualHost *:80>
    ServerName 10.125.48.102
    ServerAlias localhost
    
    # Document root untuk semua aplikasi
    DocumentRoot "C:/xampp/htdocs"
    
    # PEAFORM Application - /peaf/
    Alias /peaf "C:/xampp/htdocs/peaf"
    
    <Directory "C:/xampp/htdocs/peaf">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable React Router (SPA)
        RewriteEngine On
        RewriteBase /peaf/
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-l
        RewriteRule . /peaf/index.html [L]
    </Directory>
    
    # Proxy API requests to backend
    # /api -> http://localhost:3002/api
    ProxyPreserveHost On
    ProxyPass /peaf/api http://localhost:3002/api
    ProxyPassReverse /peaf/api http://localhost:3002/api
    
    # Enable CORS headers
    <Location /peaf>
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Cookie"
        Header always set Access-Control-Allow-Credentials "true"
    </Location>
    
    # Handle OPTIONS requests for CORS preflight
    <Location /peaf/api>
        <If "%{REQUEST_METHOD} == 'OPTIONS'">
            Header always set Access-Control-Allow-Origin "*"
            Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
            Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Cookie"
            Header always set Access-Control-Allow-Credentials "true"
            Header always set Access-Control-Max-Age "3600"
        </If>
    </Location>
</VirtualHost>

# Notes:
# 1. Pastikan Apache listen di 0.0.0.0:80 (bukan 127.0.0.1:80)
# 2. Pastikan firewall allow port 80
# 3. Pastikan backend running di port 3002
# 4. Restart Apache setelah perubahan config
