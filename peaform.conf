# PEAFORM Apache Configuration
# File ini akan di-include di httpd.conf
# Konfigurasi ini akan ditambahkan ke VirtualHost yang sudah ada

# ============================================
# PEAFORM Configuration
# URL: http://10.125.48.102/peaf/
# ============================================

# API Proxy untuk PEAFORM
ProxyPass /peaf/api http://localhost:3002/api connectiontimeout=10 timeout=90
ProxyPassReverse /peaf/api http://localhost:3002/api

# Frontend Static Files untuk PEAFORM
Alias /peaf "C:/MyServer/htdocs/peaf"

<Directory "C:/MyServer/htdocs/peaf">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    # React Router - SPA routing
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /peaf/

        # Don't rewrite files or directories
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d

        # Rewrite everything else to index.html
        RewriteRule ^ index.html [L]
    </IfModule>

    # CORS Headers
    <IfModule mod_headers.c>
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Cookie"
        Header always set Access-Control-Allow-Credentials "true"
        
        # Cookie isolation
        Header always edit Set-Cookie ^(.*)$ "$1; Path=/peaf/; SameSite=Lax"
    </IfModule>
</Directory>
