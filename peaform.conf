# PEAFORM Apache Configuration
# ============================================================
# Konfigurasi ini di-INCLUDE ke dalam VirtualHost *:80 di smp.conf
# URL Akses: http://10.125.48.102/peaf/
# Backend   : localhost:3002
# Frontend  : C:/MyServer/htdocs/peaf
# ============================================================

    # ── API Proxy (harus didefinisikan SEBELUM Alias agar tidak terhijack) ──
    ProxyPass /peaf/api http://localhost:3002/api connectiontimeout=10 timeout=90
    ProxyPassReverse /peaf/api http://localhost:3002/api

    # ── Upload / Static Assets dari Backend ──
    ProxyPass /peaf/uploads http://localhost:3002/uploads connectiontimeout=10 timeout=90
    ProxyPassReverse /peaf/uploads http://localhost:3002/uploads

    # ── Frontend Static Files ──
    Alias /peaf "C:/MyServer/htdocs/peaf"

    <Directory "C:/MyServer/htdocs/peaf">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html

        # React Router – SPA routing
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /peaf/

            # Jangan rewrite file/direktori yang ada
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d

            # Semua route selain file → index.html
            RewriteRule ^ index.html [L]
        </IfModule>

        # Cache control untuk index.html (SPA)
        <FilesMatch "^index\.html$">
            <IfModule mod_headers.c>
                Header always set Cache-Control "no-cache, no-store, must-revalidate"
                Header always set Pragma "no-cache"
                Header always set Expires 0
            </IfModule>
        </FilesMatch>
    </Directory>
