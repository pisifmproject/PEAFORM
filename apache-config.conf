# PEAFORM Apache Configuration - Port 9000
# Dedicated port untuk PEAFORM (tidak conflict dengan PORT 80)
# Note: Listen 9000 is configured in httpd.conf

# VirtualHost for Port 9000 - PEAFORM
<VirtualHost *:9000>
    ServerName 10.125.48.102
    ServerAlias localhost peaform.local
    
    ProxyPreserveHost On
    ProxyRequests Off

    # API Proxy untuk PEAFORM Backend
    ProxyPass /api http://localhost:3002/api connectiontimeout=10 timeout=90
    ProxyPassReverse /api http://localhost:3002/api

    # Frontend root
    DocumentRoot "C:/xampp/htdocs/peaform"
    
    <Directory "C:/xampp/htdocs/peaform">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # React Router - SPA routing
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
        </IfModule>

        # CORS Headers
        <IfModule mod_headers.c>
            Header always set Access-Control-Allow-Origin "*"
            Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
            Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Cookie"
            Header always set Access-Control-Allow-Credentials "true"
        </IfModule>
    </Directory>

    # Logging
    ErrorLog "logs/peaform-9000-error.log"
    CustomLog "logs/peaform-9000-access.log" common
</VirtualHost>

